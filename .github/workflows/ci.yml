name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Vet
        run: go vet ./internal/... ./cmd/...
      - name: Test
        run: go test ./internal/...
      - name: Build WASM
        run: GOOS=js GOARCH=wasm go build -o site/main.wasm ./cmd/sdvedit/
